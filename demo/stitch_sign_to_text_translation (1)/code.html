<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice to Sign Translation - Gestura</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "primary-dark": "#0b3fa8",
                        "primary-light": "#eef4ff",
                        "background-light": "#f8f9fc",
                        "background-dark": "#101622",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2436",
                        "text-primary-light": "#0d121b",
                        "text-primary-dark": "#ffffff",
                        "text-secondary-light": "#4c669a",
                        "text-secondary-dark": "#94a3b8",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-primary-light dark:text-text-primary-dark min-h-screen flex flex-col antialiased selection:bg-primary selection:text-white">
<!-- Header -->
<header class="flex items-center justify-between px-4 pt-12 pb-2 bg-surface-light dark:bg-surface-dark border-b border-gray-100 dark:border-gray-800 sticky top-0 z-10">
<button class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-text-primary-light dark:text-text-primary-dark">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Voice to Sign</h1>
<button class="p-2 -mr-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-text-primary-light dark:text-text-primary-dark">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col p-4 gap-6 max-w-md mx-auto w-full pb-24">
<!-- Segmented Control -->
<div class="bg-gray-200 dark:bg-gray-800 rounded-lg p-1 flex relative">
<label class="flex-1 relative cursor-pointer z-10">
<input checked="" class="peer sr-only" name="input_mode" type="radio" value="microphone"/>
<div class="py-2 px-4 rounded-md text-sm font-medium text-center transition-all duration-200 text-text-secondary-light dark:text-text-secondary-dark peer-checked:bg-surface-light dark:peer-checked:bg-surface-dark peer-checked:text-primary peer-checked:shadow-sm">
                    Microphone
                </div>
</label>
<label class="flex-1 relative cursor-pointer z-10">
<input class="peer sr-only" name="input_mode" type="radio" value="camera"/>
<div class="py-2 px-4 rounded-md text-sm font-medium text-center transition-all duration-200 text-text-secondary-light dark:text-text-secondary-dark peer-checked:bg-surface-light dark:peer-checked:bg-surface-dark peer-checked:text-primary peer-checked:shadow-sm">
                    Camera
                </div>
</label>
</div>
<!-- Avatar Container -->
<div class="relative w-full aspect-[4/5] bg-gradient-to-br from-primary-light to-white dark:from-surface-dark dark:to-background-dark rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden group">
<!-- 3D Avatar Placeholder -->
<div class="absolute inset-0 flex items-center justify-center">
<img alt="3D minimal avatar character looking friendly" class="w-full h-full object-cover opacity-90 dark:opacity-80 mix-blend-multiply dark:mix-blend-normal" data-alt="3D minimalist avatar performing sign language" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFBkS1uHfnCLPvGm_hR-0KSpEfzLfiJnBEz9nt043c1g3DNukvWwMrNVNTfpWbKg6wzjP3zuu4-aTO-U2UQn-1q7Fe-ujpuj9dslWbIntvJWqkyQLnNToG0iGdq68FXpUKZ9AFxUuqqSQIydB3fN1b78ScBv3xhSSB3DnzM1jzwRN8sK04LR7AHweuAKwwgHSSyS2xIykF6Ci1n4d5Jm7a2_hJazBkq4IHru1m-x59jrRdKWF4Kbb4W4KigQusjCcxPtRl3uU9KJlq"/>
</div>
<!-- Avatar Status Overlay -->
<div class="absolute top-4 left-4 right-4 flex justify-between items-start">
<div class="px-3 py-1 bg-surface-light/90 dark:bg-surface-dark/90 backdrop-blur-md rounded-full border border-white/20 shadow-sm">
<span class="text-xs font-medium text-primary flex items-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        Gestura AI Live
                    </span>
</div>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-light/90 dark:bg-surface-dark/90 backdrop-blur-md text-text-secondary-light hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">fullscreen</span>
</button>
</div>
<!-- Controls Overlay -->
<div class="absolute bottom-4 right-4 flex gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary text-white shadow-lg hover:bg-primary-dark transition-colors transform active:scale-95">
<span class="material-symbols-outlined">replay</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-light dark:bg-surface-dark text-text-primary-light dark:text-text-primary-dark shadow-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors transform active:scale-95">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</div>
<!-- Real-time Transcription -->
<div class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<h3 class="text-lg font-bold">Transcription</h3>
<span class="text-xs font-medium text-text-secondary-light dark:text-text-secondary-dark bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">English (US)</span>
</div>
<div class="bg-surface-light dark:bg-surface-dark p-5 rounded-2xl border border-primary/20 shadow-sm relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
<p class="text-xl font-medium leading-relaxed text-text-primary-light dark:text-text-primary-dark">
                    "Hello, how are you doing today? Can I help you with anything?"
                </p>
<div class="mt-4 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="flex gap-0.5 h-4 items-end">
<div class="w-1 bg-primary/60 rounded-full h-2 animate-[bounce_1s_infinite]"></div>
<div class="w-1 bg-primary/60 rounded-full h-3 animate-[bounce_1.1s_infinite]"></div>
<div class="w-1 bg-primary/60 rounded-full h-4 animate-[bounce_1.2s_infinite]"></div>
<div class="w-1 bg-primary/60 rounded-full h-2 animate-[bounce_1s_infinite]"></div>
</div>
<span class="text-sm text-text-secondary-light dark:text-text-secondary-dark">Listening...</span>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-all relative">
<span class="absolute inset-0 rounded-full bg-primary/20 animate-ping opacity-75"></span>
<span class="material-symbols-outlined text-2xl relative z-10">mic</span>
</button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full bg-surface-light/95 dark:bg-surface-dark/95 backdrop-blur-lg border-t border-gray-200 dark:border-gray-800 pb-safe-area-inset-bottom z-50">
<div class="flex justify-around items-end px-2 py-3 pb-6">
<a class="flex flex-col items-center gap-1 min-w-[64px] group" href="#">
<div class="flex items-center justify-center w-12 h-8 rounded-full bg-primary/10 text-primary transition-colors">
<span class="material-symbols-outlined text-2xl font-variation-settings-fill">translate</span>
</div>
<span class="text-[10px] font-medium text-primary">Translate</span>
</a>
<a class="flex flex-col items-center gap-1 min-w-[64px] group" href="#">
<div class="flex items-center justify-center w-12 h-8 rounded-full text-text-secondary-light dark:text-text-secondary-dark group-hover:bg-gray-100 dark:group-hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-2xl">school</span>
</div>
<span class="text-[10px] font-medium text-text-secondary-light dark:text-text-secondary-dark">Learn</span>
</a>
<a class="flex flex-col items-center gap-1 min-w-[64px] group" href="#">
<div class="flex items-center justify-center w-12 h-8 rounded-full text-text-secondary-light dark:text-text-secondary-dark group-hover:bg-gray-100 dark:group-hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-2xl">menu_book</span>
</div>
<span class="text-[10px] font-medium text-text-secondary-light dark:text-text-secondary-dark">Dictionary</span>
</a>
<a class="flex flex-col items-center gap-1 min-w-[64px] group" href="#">
<div class="flex items-center justify-center w-12 h-8 rounded-full text-text-secondary-light dark:text-text-secondary-dark group-hover:bg-gray-100 dark:group-hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-2xl">person</span>
</div>
<span class="text-[10px] font-medium text-text-secondary-light dark:text-text-secondary-dark">Profile</span>
</a>
</div>
</nav>
<style>
        /* Custom styles for bouncing animation sequence */
        @keyframes bounce {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        .pb-safe-area-inset-bottom {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .font-variation-settings-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</body></html>
